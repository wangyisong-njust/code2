experiment:
  name: pu_adaptive_sdae
  output_dir: outputs/pu_adaptive_sdae
  methods:
    - erm
    - mixup
    - coral
    - mmd
    - dann
    - proposed
  seeds:
    - 42
    - 7
    - 2024
  tasks:
    - name: speed_shift
      source_domain: d
      target_domain: a
    - name: load_shift
      source_domain: d
      target_domain: b
    - name: radial_shift
      source_domain: d
      target_domain: c

data:
  root: data/pu/ntu
  normalize: zscore
  num_workers: 0

model:
  hidden_dims:
    - 512
    - 256
  latent_dim: 64
  stats_hidden_dims:
    - 32
    - 16
  dropout: 0.1

adaptive_search:
  enabled: true
  search_pretrain_epochs: 2
  search_finetune_epochs: 4
  width_step: 128
  max_hidden_dim: 1024
  depth_scale: 0.5
  min_hidden_dim: 128
  max_stages: 4
  min_loss_delta: 0.001
  min_rel_loss_delta: 0.003
  patience: 1
  # Oscillation detection (paper Fig.3-2): block acceptance when the tail of
  # the training-loss trajectory is unstable (high relative std or non-decreasing).
  oscillation_enabled: true
  oscillation_window: 4
  oscillation_rel_std_thresh: 0.15
  oscillation_slope_thresh: 0.0

training:
  seed: 42
  batch_size: 256
  pretrain_epochs: 3
  finetune_epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler_gamma: 0.5
  method_params:
    mixup_alpha: 0.2
    coral_weight: 0.2
    mmd_weight: 0.2
    recon_weight: 0.2
    consistency_weight: 0.1
    discriminative_weight: 0.02
    discriminative_margin: 8.0
    # NOTE: paper-aligned upgrade flags below were ablated (see §M of
    # docs/final_delivery.md). The 7-variant module ablation showed:
    # - KL sparsity (kept ON): consistently helps (+1.2pp average).
    # - discriminative_squared: roughly neutral (slight loss).
    # - discriminative_adaptive: hurts (−12pp on speed_shift) — the
    #   detached-magnitude balance shrinks the inter-class force exactly when
    #   intra collapses, defeating the separation objective. Disabled by default.
    # - oscillation_enabled (in adaptive_search below): inert at the chosen
    #   thresholds in this dataset (Δ = 0). Kept ON because the additional
    #   logging is harmless and useful for the search-history CSV.
    discriminative_intra_weight: 1.0
    discriminative_inter_weight: 1.0
    discriminative_squared: false
    discriminative_adaptive: false
    # KL-sparsity penalty in SDAE pretraining (Eq.(9) of the reference paper).
    pretrain_sparsity_rho: 0.05
    pretrain_sparsity_weight: 0.001
    speed_aug_weight: 0.2
    speed_consistency_weight: 0.05
    denoise_std: 0.05
    consistency_noise_db: 6.0
    dann_weight: 0.1
    dann_lambda_max: 1.0

protocol:
  # uda: target_train (无标签) 可参与 align/recon/consistency；target_test 始终不入训练
  # strict_dg: 不使用任何目标域样本（包括 target_train）
  mode: uda

evaluation:
  snr_db:
    - 6.0
    - 0.0
    - -6.0
  embedding_method: tsne
  embedding_max_points: 1500
